<ng-container *ngIf="isPublicRoute()">
  <router-outlet></router-outlet>
</ng-container>

<ng-container *ngIf="!isPublicRoute()">
  <nav class="navbar navbar-expand-lg shadow-sm" style="background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%); border-bottom: 3px solid #C62828; padding: 12px 24px;">
    <div class="container-fluid">
      <div class="navbar-brand" style="cursor: default; padding: 0;">
        <img 
          src="assets/inmo1.webp" 
          alt="Team InMotion" 
          height="50" 
          style="display: block; height: 50px; width: auto;"
          (error)="onLogoError($event)"
        >
      </div>
      <button class="btn btn-logout" (click)="logout()">
        <span class="logout-icon">⏻</span>
        <span class="logout-text">Cerrar Sesión</span>
      </button>
    </div>
  </nav>

  <div class="d-flex">
    <div class="bg-white vh-100 p-3 shadow-sm" style="width: 220px; border-right: 1px solid #ddd;">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active fw-bold text-danger">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/crear" routerLinkActive="active fw-bold text-danger">Crear Encuesta</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/listar" routerLinkActive="active fw-bold text-danger">Listar Encuestas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/importar" routerLinkActive="active fw-bold text-danger">Importar Datos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contestar-manual" routerLinkActive="active fw-bold text-danger">Contestar Manual</a>
        </li>
      </ul>
    </div>

    <div class="flex-grow-1 p-4" style="background: #f5f7fa; min-height: 100vh;">
      <router-outlet></router-outlet>
    </div>
  </div>
</ng-container>
