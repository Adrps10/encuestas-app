<div class="container-fluid vh-100 d-flex align-items-center" style="background: #0A0A0A;">
  <div class="row w-100">
    <div class="col-lg-6 text-white text-center">
      <h1 class="display-3 fw-bold">INMOTION</h1>
      <p class="lead">Control de Encuestas</p>
    </div>
    <div class="col-lg-6 d-flex justify-content-center">
      <div class="card p-4" style="width: 380px;">
        <h2 class="text-center">Iniciar Sesión</h2>
        <form (ngSubmit)="login()">
          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email" [(ngModel)]="email" name="email">
          </div>
          <div class="mb-3">
            <input type="password" class="form-control" placeholder="Contraseña" [(ngModel)]="password" name="password">
          </div>
          <button class="btn btn-danger w-100 fw-bold">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
